name: Backend CI Pipeline

on:
  push:
    branches:
      - develop
      - qa
      - tempmain
      - main
  pull_request:
    branches:
      - develop
      - qa
      - tempmain
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test